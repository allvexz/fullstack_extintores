<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyroSync — Teste</title>
    <link rel="stylesheet" href="view/style.css">
</head>
<body>
    <main style="max-width:560px;margin:48px auto;font-family:Arial,Helvetica,sans-serif;">
        <h1>PyroSync — Teste Básico</h1>
        <p>Use este HTML simples para testar se o backend responde.</p>

        <label for="inputText">Texto (opcional):</label>
        <input id="inputText" type="text" placeholder="teste">
        <button id="testBtn">Testar conexão</button>

        <h3>Resultado:</h3>
        <pre id="output" style="white-space:pre-wrap;background:#f6f6f6;padding:12px;border-radius:6px;min-height:60px;"></pre>

        <p style="margin-top:18px;color:#666;font-size:14px">O botão faz um GET para <code>/test</code>. Ajuste o endpoint no script se necessário.</p>
    </main>

    <script>
        document.getElementById('testBtn').addEventListener('click', async () => {
            const out = document.getElementById('output');
            const payload = document.getElementById('inputText').value;
            out.textContent = 'Enviando...';
            try {
                const url = '/test' + (payload ? ('?q=' + encodeURIComponent(payload)) : '');
                const res = await fetch(url);
                const text = await res.text();
                out.textContent = `Status: ${res.status}\nResposta:\n${text}`;
            } catch (err) {
                out.textContent = 'Erro: ' + err.message;
            }
        });
    </script>
</body>
</html>
